<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Manual — Igropyr</title><meta name="description" content="The Igropyr manual: architecture, the actor model, the libuv-callback invariant, fault tolerance, conversations, clients, and more."><link rel="icon" href="favicon.svg" type="image/svg+xml"><style>:root{--bg:#ffffff;--bg2:#f6f8fa;--panel:#f6f8fa;--line:#e2e7ee;--fg:#1f2430;--dim:#57606a;--acc:#e8590c;--acc2:#0969da;--warn:#9a6700;--kw:#8250df;--str:#0a7227;--com:#6e7781;--num:#953800;}*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:var(--bg);color:var(--fg);font:16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;-webkit-font-smoothing:antialiased;}code, pre, .mono{font-family:ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;}a{color:var(--acc2);text-decoration:none;}a:hover{text-decoration:underline;}a.name{color:var(--fg);text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--line);}a.name:hover{text-decoration-color:var(--dim);}.wrap{max-width:1060px;margin:0 auto;padding:0 24px;}nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,0.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}nav .wrap{display:flex;align-items:center;height:56px;gap:22px;}nav .logo{font-weight:700;color:var(--fg);font-size:17px;}nav .logo span{color:var(--acc);}nav .links{margin-left:auto;display:flex;gap:18px;font-size:14px;}nav .links a{color:var(--dim);}nav .links a:hover{color:var(--fg);text-decoration:none;}header{padding:84px 0 64px;text-align:center;background:radial-gradient(62% 52% at 50% 0%, #fff0e6 0%, transparent 100%);position:relative;overflow:hidden;}header .wrap{position:relative;z-index:1;}.lam{font-size:52px;color:var(--acc);line-height:1;}h1{font-size:56px;letter-spacing:-1px;margin:10px 0 14px;}.tag{font-size:21px;color:var(--dim);max-width:640px;margin:0 auto 12px;}.tag b{color:var(--fg);font-weight:600;}.sub{color:var(--dim);font-size:15px;margin-bottom:34px;}.cta{display:flex;gap:14px;justify-content:center;margin-bottom:40px;}.btn{display:inline-block;padding:11px 22px;border-radius:8px;font-size:15px;font-weight:600;}.btn.primary{background:var(--acc);color:#ffffff;}.btn.primary:hover{filter:brightness(1.1);text-decoration:none;}.btn.ghost{border:1px solid var(--line);color:var(--fg);}.btn.ghost:hover{border-color:var(--dim);text-decoration:none;}.quick{max-width:620px;margin:0 auto;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 22px;font-size:14px;}.quick .c{color:var(--com);}.hive{position:absolute;top:-80px;right:-120px;width:min(72vw, 1120px);height:auto;pointer-events:none;}@media (max-width: 700px){.hive{top:0;right:auto;left:50%;width:160vw;transform:translateX(-50%);height:auto;}}@media (prefers-reduced-motion: reduce){.hive{display:none;}}section{padding:72px 0;border-top:1px solid var(--line);}.kicker{color:var(--acc);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}h2{font-size:34px;margin:8px 0 14px;letter-spacing:-.5px;}.lead{color:var(--dim);font-size:17px;max-width:680px;}.lead code{color:var(--acc);font-size:0.82em;background:var(--bg2);padding:1px 5px;border-radius:4px;}.feature{display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:center;margin-top:40px;}.feature.flip .txt{order:2;}.feature h3{font-size:24px;margin-bottom:12px;}.feature p{color:var(--dim);margin-bottom:12px;}.feature p b, .feature li b{color:var(--fg);font-weight:600;}.feature ul{color:var(--dim);padding-left:20px;}.feature li{margin:6px 0;}pre{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:20px;overflow-x:auto;font-size:13.5px;line-height:1.06;}.k{color:var(--kw);}.s{color:var(--str);}.c{color:var(--com);font-style:italic;}.n{color:var(--num);}.f{color:var(--acc2);}.rpcwire{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:22px;}.rpcwire .wnode{display:inline-flex;align-items:center;gap:9px;font-weight:600;color:var(--fg);font-size:15px;text-decoration:none;}.rpcwire .wnode:hover{color:var(--acc);text-decoration:none;}.rpcwire .wnode img{display:block;}.rpcwire .warrow{font-size:26px;color:var(--dim);}.cards{display:grid;grid-template-columns:repeat(3, 1fr);gap:20px;margin-top:40px;}.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:26px;}.card .ic{font-size:26px;margin-bottom:12px;}.card h3{font-size:18px;margin-bottom:10px;}.card p{color:var(--dim);font-size:14.5px;}.card code{color:var(--acc);font-size:13px;}.fgrid{max-width:780px;margin-top:40px;}.fitem{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--line);}.fitem:last-child{border-bottom:none;}.fterm{display:block;color:var(--fg);font-weight:700;font-size:18px;margin-bottom:7px;letter-spacing:-.2px;}.fterm b{font-weight:700;}.fdesc{display:block;color:var(--dim);font-size:15.5px;line-height:1.65;}.fitem code{color:var(--acc);font-size:13.5px;background:var(--bg2);padding:1px 5px;border-radius:4px;}.credits{display:flex;flex-wrap:wrap;gap:14px;margin-top:26px;}.credit{display:inline-flex;align-items:center;gap:9px;padding:9px 16px 9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--fg);font-size:15px;font-weight:600;}.credit:hover{border-color:var(--dim);text-decoration:none;}.credit img{display:block;}.strip{display:flex;justify-content:center;gap:64px;flex-wrap:wrap;margin-top:44px;text-align:center;}.strip .num{font-size:34px;font-weight:700;color:var(--acc);}.strip .lbl{color:var(--dim);font-size:13.5px;}footer{border-top:1px solid var(--line);padding:40px 0 56px;color:var(--dim);font-size:14px;text-align:center;}footer .links{margin-bottom:10px;display:flex;gap:22px;justify-content:center;}@media (max-width: 840px){h1{font-size:40px;}.feature{grid-template-columns:1fr;}.feature.flip .txt{order:0;}.cards{grid-template-columns:1fr;}.strip{gap:34px;}}.maptable{width:100%;border-collapse:collapse;margin-top:34px;font-size:14.5px;}.maptable th{text-align:left;color:var(--dim);font-weight:600;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:0 16px 12px 0;border-bottom:1px solid var(--line);}.maptable td{padding:13px 16px 13px 0;border-bottom:1px solid var(--line);vertical-align:top;color:var(--dim);}.maptable td:first-child{color:var(--fg);white-space:nowrap;}.maptable code{color:var(--acc);font-size:12.5px;background:var(--bg2);padding:1px 5px;border-radius:4px;}.backlink{display:inline-block;margin-top:8px;color:var(--dim);font-size:14px;}.manualhead{padding:40px 0 8px;}.manualhead .wrap{display:flex;align-items:center;gap:16px;}.manualhead h1{font-size:34px;letter-spacing:-.5px;margin:0;}.langtoggle{margin-left:auto;display:flex;gap:6px;}.langtoggle button{font:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:6px 14px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--dim);}.langtoggle button.on{background:var(--acc);color:#fff;border-color:var(--acc);}.md-body{max-width:820px;margin:0 auto;padding:20px 24px 90px;color:#2b303a;font-size:16px;line-height:1.07;}.md-body h1, .md-body h2, .md-body h3, .md-body h4{color:var(--fg);letter-spacing:-.3px;line-height:1.03;margin:1.9em 0 .6em;scroll-margin-top:72px;}.md-body h1{font-size:30px;}.md-body h2{font-size:24px;padding-bottom:0.3em;border-bottom:1px solid var(--line);}.md-body h3{font-size:19px;}.md-body h4{font-size:16px;}.md-body p, .md-body li{color:#2b303a;}.md-body a{color:var(--acc2);}.md-body ul, .md-body ol{padding-left:26px;margin:0.6em 0;}.md-body li{margin:0.32em 0;}.md-body code{font-family:ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;font-size:0.86em;background:var(--bg2);color:#b02a4a;padding:1.5px 6px;border-radius:5px;}.md-body pre{background:#0f141c;border:1px solid #0f141c;border-radius:10px;padding:18px 20px;overflow-x:auto;margin:1em 0;}.md-body pre code{background:none;color:#d7dde8;padding:0;font-size:13.5px;line-height:1.06;}.md-body table{border-collapse:collapse;width:100%;margin:1.2em 0;font-size:14.5px;display:block;overflow-x:auto;}.md-body th, .md-body td{border:1px solid var(--line);padding:8px 12px;text-align:left;vertical-align:top;}.md-body th{background:var(--bg2);color:var(--fg);font-weight:600;}.md-body blockquote{margin:1em 0;padding:0.3em 1em;color:var(--dim);border-left:3px solid var(--line);}.md-body hr{border:none;border-top:1px solid var(--line);margin:2em 0;}.md-body img{max-width:100%;}.md-loading{max-width:820px;margin:40px auto;padding:0 24px;color:var(--dim);}</style></head><body><nav><div class="wrap"><div class="logo"><a href="index.html" style="color:inherit"><span>λ</span> Igropyr</a></div><div class="links"><a href="manual.html">Manual</a><a href="agent.html">Agent</a><a href="https://github.com/guenchi/Igropyr">GitHub</a></div></div></nav><div class="manualhead"><div class="wrap"><h1>Manual</h1><div class="langtoggle"><button id="btn-en" class="on" onclick="loadManual('en')">English</button><button id="btn-zh" onclick="loadManual('zh')">简体中文</button></div></div></div><main id="md" class="md-body"><p class="md-loading">Loading the manual…</p></main><footer><div class="links"><a href="index.html">Igropyr</a><a href="agent.html">Agent</a><a href="https://github.com/guenchi/Igropyr">GitHub</a></div></footer><script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script><script>
  var SRC = { en: 'docs/manual.md', zh: 'docs/manual.zh-cn.md' };

  function slug(s) {
    return s.toLowerCase().trim()
      .replace(/[^\w一-龥\s-]/g, '')
      .replace(/\s+/g, '-');
  }

  function loadManual(lang) {
    document.getElementById('btn-en').classList.toggle('on', lang === 'en');
    document.getElementById('btn-zh').classList.toggle('on', lang === 'zh');
    document.documentElement.lang = (lang === 'zh') ? 'zh' : 'en';
    var el = document.getElementById('md');
    el.innerHTML = '<p class="md-loading">Loading…</p>';
    fetch(SRC[lang]).then(function (r) {
      if (!r.ok) throw new Error(r.status);
      return r.text();
    }).then(function (md) {
      el.innerHTML = marked.parse(md, { gfm: true, breaks: false });
      // give headings stable ids so the in-doc table of contents jumps work
      el.querySelectorAll('h1,h2,h3,h4').forEach(function (h) {
        if (!h.id) h.id = slug(h.textContent);
      });
      if (location.hash) {
        var t = document.getElementById(location.hash.slice(1));
        if (t) t.scrollIntoView();
      }
    }).catch(function (e) {
      el.innerHTML = '<p class="md-loading">Could not render the manual ('
        + e.message + '). Read it on '
        + '<a href="' + SRC[lang] + '">the raw file</a> or on '
        + '<a href="https://github.com/guenchi/Igropyr/blob/website/'
        + SRC[lang] + '">GitHub</a>.</p>';
    });
  }

  // language from ?lang=zh or #zh, else default English
  var q = (location.search.match(/[?&]lang=(zh|en)/) || [])[1];
  var initial = q || (/^#?zh/.test(location.hash) ? 'zh' : 'en');
  loadManual(initial === 'zh' ? 'zh' : 'en');
</script></body></html>
