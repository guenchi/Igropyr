name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: igropyr
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install chezscheme libuv
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y chezscheme libuv1-dev zlib1g-dev
      - name: Run tests
        working-directory: igropyr
        run: ./test/run-all.sh

